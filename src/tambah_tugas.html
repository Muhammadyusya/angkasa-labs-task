<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">>
    <title>Angkasa Labs</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <h1>Angkasa Labs Task Manager</h1>

    <div class="section-box">
        <h3>Form Tambah Proyek</h3>
        <div class="input-row">
            <label>Tambah Proyek:</label>
            <input type="text" id="nama_proyek_baru" placeholder="Nama Proyek Baru...">
            <button type="button" class="btn-add" onclick="tambahOpsi('nama_proyek_baru', 'id_proyek', 'Proyek')">Tambah Proyek</button>
        </div>
        <div class="input-row">
            <label>Tambah Penanggung Jawab:</label>
            <input type="text" id="nama_pic_baru" placeholder="Nama Anggota Tim...">
            <button type="button" class="btn-add" onclick="tambahOpsi('nama_pic_baru', 'id_penanggungjawab', 'PIC')">Tambah PIC</button>
        </div>

        <div class="section-box">
        <h3>Form Input Proyek</h3>
        <form action="#">
            <div class="input-row">
                <label>Pilih Proyek:</label>
                <select name="id_proyek" id="id_proyek" required>
                    <option value="">-- Daftar Proyek --</option>
                </select>
            </div>

            <div class="input-row">
                <label>Judul Tugas:</label>
                <input type="text" name="judul_tugas" required>
            </div>

            <div class="input-row">
                <label>Deskripsi Tugas:</label>
                <textarea name="deskripsi" rows="4" placeholder="Jelaskan detail instruksi pengerjaan..."></textarea>
            </div>

            <div class="input-row">
                <label>Pilih Penanggung Jawab:</label>
                <select name="id_penanggungjawab" id="id_penanggungjawab" required>
                    <option value="">-- Daftar Penanggung Jawab --</option>
                </select>
            </div>

            <div class="input-row">
                <label>Deadline:</label>
                <input type="datetime-local" name="deadline" required>
            </div>
    </div>
</body>
</html>
