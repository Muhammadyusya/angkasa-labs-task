<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login | Angkasa Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
  </head>
  <body class="bg-[#f9f9fc] flex items-center justify-center min-h-screen p-6">
    <div
      class="w-full max-w-md bg-white rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.05)] p-10 border border-gray-100"
    >
      <div class="flex flex-col items-center mb-10">
        <div
          class="w-12 h-12 rounded-xl bg-[#0034b1] flex items-center justify-center text-white mb-4 shadow-lg shadow-blue-200"
        >
          <span
            class="material-symbols-outlined"
            style="font-variation-settings: &quot;FILL&quot; 1"
            >rocket_launch</span
          >
        </div>
        <h1 class="text-2xl font-bold tracking-tight text-[#1a1c1e]">
          Selamat Datang
        </h1>
        <p class="text-sm text-gray-500 mt-1">
          Masuk ke dashboard Angkasa Labs
        </p>
      </div>

      <form action="index.html" class="space-y-6">
        <div class="space-y-2">
          <label
            class="text-[10px] font-bold uppercase tracking-widest text-gray-400"
            >Username / Email</label
          >
          <div class="relative">
            <span
              class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg"
              >person</span
            >
            <input
              type="text"
              required
              class="w-full pl-10 pr-4 py-3 bg-[#f3f3f6] border-none rounded-lg focus:ring-2 focus:ring-blue-100 outline-none transition-all placeholder:text-gray-400"
              placeholder="Masukkan username"
            />
          </div>
        </div>

        <div class="space-y-2">
          <label
            class="text-[10px] font-bold uppercase tracking-widest text-gray-400"
            >Password</label
          >
          <div class="relative">
            <span
              class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg"
              >lock</span
            >
            <input
              type="password"
              required
              class="w-full pl-10 pr-4 py-3 bg-[#f3f3f6] border-none rounded-lg focus:ring-2 focus:ring-blue-100 outline-none transition-all placeholder:text-gray-400"
              placeholder="••••••••"
            />
          </div>
        </div>

        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 cursor-pointer">
            <input
              type="checkbox"
              class="w-4 h-4 rounded border-gray-300 text-[#0034b1] focus:ring-[#0034b1]"
            />
            <span class="text-xs text-gray-600">Ingat Saya</span>
          </label>
          <a
            href="#"
            class="text-xs text-[#0034b1] font-semibold hover:underline"
            >Lupa Password?</a
          >
        </div>

        <button
          type="submit"
          class="w-full py-4 bg-gradient-to-r from-[#0034b1] to-[#1b4bdb] text-white rounded-lg font-bold shadow-lg shadow-blue-100 hover:shadow-xl hover:translate-y-[-2px] transition-all"
        >
          Masuk Sekarang
        </button>
      </form>
    </div>
  </body>
</html>
