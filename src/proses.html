      <a href="./daftar_tugas.html" class="nav-item">

  <div class="main">

      <div class="topbar-crumb">

        <b>Board Proses</b>

      <a href="./tambah_tugas.html" class="btn btn-ghost" style="font-size:.75rem;padding:5px 12px;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

    <div class="content">
      <div class="ph">
        <div class="ph-sub">Monitor Progres</div>
        <h1 class="ph-title">Board <em>tugas aktif</em></h1>
        <p class="ph-desc">Geser tugas antar kolom dengan tombol panah di tiap kartu.</p>
      </div>
      <div class="board" id="board"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // Key localStorage yang sama dengan halaman lain
  const STORAGE_KEY = 'al_tasks';

  function getAllTasks() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch {
      return [];
    }
  }

  function saveTasks(tasks) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  // Urutan status dan mapping navigasi antar kolom
  const statusColumns = [
    { status: 'Pending', label: 'Pending', icon: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>' },
    { status: 'Dalam Proses', label: 'Dalam Proses', icon: '<path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>' },
    { status: 'Selesai', label: 'Selesai', icon: '<path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>' },
  ];

  const nextStatus = {
    'Pending': 'Dalam Proses',
    'Dalam Proses': 'Selesai',
    'Selesai': null
  };

  const prevStatus = {
    'Pending': null,
    'Dalam Proses': 'Pending',
    'Selesai': 'Dalam Proses'
  };

  function escapeHtml(text) {
    return String(text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('on');
    setTimeout(() => toast.classList.remove('on'), 2400);
  }

  function renderBoard() {
    const tasks = getAllTasks();
    const boardEl = document.getElementById('board');

    boardEl.innerHTML = statusColumns.map(col => {
      const tasksInColumn = tasks.filter(t => t.status === col.status);
      const next = nextStatus[col.status];
      const prev = prevStatus[col.status];

      const cardsHtml = tasksInColumn.length === 0
        ? `<div class="bcol-empty">Tidak ada tugas di kolom ini</div>`
        : tasksInColumn.map(task => {
            const priorityDotClass = task.prio === 'Tinggi' ? 'h'
              : task.prio === 'Sedang' ? 'm'
              : 'l';

            return `<div class="bcard">
              <div class="bcard-client">${escapeHtml(task.klien)}</div>
              <div class="bcard-desc">${escapeHtml(task.desc)}</div>
              <div class="bcard-foot">
                <div class="bcard-pic">
                  <span class="pdot ${priorityDotClass}"></span>${escapeHtml(task.pic)}
                </div>
                <div style="display:flex;gap:4px;">
                  ${prev ? `<button class="bmove" data-task-id="${escapeHtml(task.id)}" data-move-to="${escapeHtml(prev)}">&#8592;</button>` : ''}
                  ${next ? `<button class="bmove" data-task-id="${escapeHtml(task.id)}" data-move-to="${escapeHtml(next)}">&#8594;</button>` : ''}
                </div>
              </div>
            </div>`;
          }).join('');

      return `<div class="bcol">
        <div class="bcol-head">
          <div class="bcol-title">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${col.icon}</svg>
            ${col.label}
          </div>
          <span class="bcol-count">${tasksInColumn.length}</span>
        </div>
        <div class="bcol-body">${cardsHtml}</div>
      </div>`;
    }).join('');

    // Pasang event listener untuk tombol panah
    document.querySelectorAll('.bmove').forEach(btn => {
      btn.addEventListener('click', function(e) {
        const taskId = this.dataset.taskId;
        const newStatus = this.dataset.moveTo;
        const tasks = getAllTasks();
        const taskIndex = tasks.findIndex(t => t.id === taskId);
        if (taskIndex === -1) return;
        tasks[taskIndex].status = newStatus;
        saveTasks(tasks);
        renderBoard();
        showToast(`Dipindah ke "${newStatus}"`);
      });
    });
  }

  renderBoard();
</script>
</body>
</html>
